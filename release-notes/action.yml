name: Release notes
description: >
  Install git-cliff and render release notes for a version using the org-wide
  git-cliff config, writing them to a file the caller passes to `gh release
  create --notes-file`. In a monorepo releasing several units, scope the notes
  to one unit with include-paths (its files) plus tag-pattern (its tag lineage)
  so another unit's commits and tags never leak into this unit's changelog.
  Needs a full-history checkout with tags (actions/checkout with
  fetch-depth: 0).

inputs:
  version:
    description: The version being released; labels the notes (git-cliff --tag).
    required: true
  previous:
    description: The previous release tag; empty for the first release (full history).
    required: false
    default: ""
  output:
    description: File to write the notes to.
    required: false
    default: notes.md
  config-url:
    description: git-cliff --config-url; defaults to the org-wide config (Renovate bumps the pin).
    required: false
    default: "https://raw.githubusercontent.com/metio/git-cliff-config/16dc9654e9eb431d6169059509ce5552912a14ad/cliff.toml"
  tag-pattern:
    description: Regex scoping release boundaries to this repo's tags (calver/semver are 3 numeric parts). For a monorepo unit, use its tag prefix instead, e.g. "^myapp-".
    required: false
    default: '^[0-9]+\.[0-9]+\.[0-9]+$'
  include-paths:
    description: Optional whitespace-separated glob(s) limiting the notes to commits touching these paths (git-cliff --include-path), e.g. "charts/myapp/**" for one unit of a monorepo. Empty includes every commit.
    required: false
    default: ""
  github-token:
    description: Token for git-cliff's remote API calls (PR/contributor enrichment).
    required: false
    default: ${{ github.token }}
  git-cliff-version:
    description: git-cliff release to install.
    required: false
    # renovate: datasource=github-releases depName=orhun/git-cliff
    default: "2.10.1"

outputs:
  file:
    description: Path to the generated notes file.
    value: ${{ inputs.output }}

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GIT_CLIFF_VERSION: ${{ inputs.git-cliff-version }}
        VERSION: ${{ inputs.version }}
        PREVIOUS: ${{ inputs.previous }}
        OUTPUT: ${{ inputs.output }}
        CONFIG_URL: ${{ inputs.config-url }}
        TAG_PATTERN: ${{ inputs.tag-pattern }}
        INCLUDE_PATHS: ${{ inputs.include-paths }}
        # git-cliff reads GITHUB_TOKEN (not GH_TOKEN) for its remote API calls;
        # without it the calls are unauthenticated (60/hr) and rate-limit out.
        GITHUB_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail
        curl -fsSL "https://github.com/orhun/git-cliff/releases/download/v${GIT_CLIFF_VERSION}/git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-gnu.tar.gz" | tar -xz -C /tmp
        sudo mv "/tmp/git-cliff-${GIT_CLIFF_VERSION}/git-cliff" /usr/local/bin/git-cliff
        # --tag labels the still-uncreated release so the config header renders
        # this version; --tag-pattern scopes release boundaries to this repo's tags.
        cliff_args=(
          --config-url "$CONFIG_URL"
          --tag "$VERSION"
          --tag-pattern "$TAG_PATTERN"
        )
        # read -ra splits the globs on whitespace WITHOUT pathname expansion —
        # a loop over the unquoted variable would let the shell expand a glob
        # like charts/x/** against the checkout before git-cliff sees it.
        read -ra include_globs <<< "${INCLUDE_PATHS//$'\n'/ }" || true
        for glob in "${include_globs[@]}"; do
          cliff_args+=(--include-path "$glob")
        done
        # First release has no previous tag: omit the positional so git-cliff
        # walks full history (a bare "HEAD" is rejected as a range).
        [ -n "$PREVIOUS" ] && cliff_args+=("${PREVIOUS}..HEAD")
        git-cliff "${cliff_args[@]}" > "$OUTPUT"
