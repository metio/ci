name: Verify
on:
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  reuse:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command ci-reuse
  yaml:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command ci-yaml
  github-actions:
    # actionlint shells out to shellcheck for `run:` blocks; a failing finding
    # blocks the merge across the whole tree (the reusable workflow and every
    # composite action are what this repo ships).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command ci-actionlint
  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command ci-markdown
  dco:
    # Dogfood the dco action this repo ships: every commit must carry a
    # Signed-off-by trailer. The require-dco policy (run by the policy job below)
    # holds this very workflow to having this job. Bot PRs skip.
    if: github.event.pull_request.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: ./dco
  policy:
    # Dogfood the policy-check action this repo ships: it runs the conftest
    # convention policies (SHA-pinned uses, no local refs in reusable workflows,
    # no untrusted run: interpolation, permissions, release concurrency, job
    # timeouts, require-dco) over our own workflows and actions.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: ./policy-check
  verify:
    # Single required check: mark only this one required in branch protection and
    # new jobs are covered automatically. Mirrors the pattern this repo gives
    # consumers via golang.yml.
    name: Verify
    needs: [reuse, yaml, github-actions, markdown, dco, policy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Verify every job succeeded or skipped
        env:
          NEEDS: ${{ toJSON(needs) }}
        run: |
          bad=$(echo "$NEEDS" | jq -r 'to_entries[] | select(.value.result != "success" and .value.result != "skipped") | "\(.key)=\(.value.result)"')
          [ -z "$bad" ] || { echo "::error::$bad"; exit 1; }
