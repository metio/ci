name: Go

# Reusable Go pipeline for metio projects. Every gate runs through the calling
# repo's nix flake devShell (`nix develop --command`), so CI resolves the exact
# tool versions in flake.lock — identical to a local run. A `detect` job skips
# the optional architecture gate when the repo has no arch-go.yml. The caller
# needs only a flake.nix that provides go + the correctness tools (go vet,
# staticcheck, gosec, gofumpt, govulncheck, arch-go, modernize) and, for
# controllers, KUBEBUILDER_ASSETS in the devShell (assembled from nixpkgs) so
# the envtest suite runs offline against the flake-pinned Kubernetes.
#
#   jobs:
#     go:
#       name: Golang        # so checks read "Golang / test", "Golang / lint", …
#       uses: metio/ci/.github/workflows/golang.yml@v1
#
# The caller keeps its own non-Go jobs and one all-green aggregate (named
# "Verify") that lists this `go` job — that aggregate is the single required
# check (see README). A Go repo that consumes this MUST ship a flake.nix.
on:
  workflow_call:
    inputs:
      runs-on:
        description: Runner label for every job.
        type: string
        default: ubuntu-latest

permissions:
  contents: read

jobs:
  detect:
    name: detect
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 10
    outputs:
      arch-go: ${{ steps.env.outputs.arch-go }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - id: env
        # The architecture gate skips itself rather than spin up a runner to
        # no-op; arch-go.yml presence is unambiguous.
        run: |
          archgo=false
          if [ -f arch-go.yml ] || [ -f .arch-go.yml ]; then archgo=true; fi
          echo "arch-go=$archgo" >> "$GITHUB_OUTPUT"
          echo "detected: arch-go=$archgo"

  test:
    name: test
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command go build ./...
      # KUBEBUILDER_ASSETS comes from the devShell, so an envtest-backed suite
      # runs against the flake-pinned Kubernetes; multi-version coverage lives in
      # the caller's kind smoke gate.
      - run: nix develop --command go test -v -race -shuffle=on -coverprofile=cover.out ./...

  lint-go:
    name: lint
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command go vet ./...
      - run: nix develop --command staticcheck ./...
      - run: nix develop --command gosec ./...
      - name: gofumpt formatting
        run: |
          unformatted="$(nix develop --command gofumpt -l .)"
          if [ -n "$unformatted" ]; then
            echo "::error::These files are not gofumpt-formatted:"
            echo "$unformatted"
            exit 1
          fi
      - name: modernize
        run: |
          # Flags code that could adopt newer-Go idioms available at the go.mod
          # version (min/max, slices/maps, range-over-int, new(expr), …). Generated
          # files are excluded: controller-gen owns zz_generated.deepcopy.go, so its
          # maps.Copy suggestions are not actionable here.
          findings="$(nix develop --command modernize ./... 2>&1 \
            | grep -vE '^go: |zz_generated\.deepcopy\.go|^exit status ' || true)"
          if [ -n "$findings" ]; then
            echo "::error::modernize found code that should adopt newer-Go idioms:"
            echo "$findings"
            exit 1
          fi

  vulnerabilities:
    name: vulnerabilities
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      # Hard gate: a reachable-from-code advisory blocks merge. The fix is usually
      # bumping the `toolchain` directive in go.mod (stdlib) or `go get -u` (deps).
      - run: nix develop --command govulncheck ./...

  architecture:
    name: architecture
    needs: detect
    if: needs.detect.outputs.arch-go == 'true'
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
      - run: nix develop --command arch-go
