name: Release

# Calendar-versioned self-release: every push to main that touches a shipped
# workflow or action cuts a tagged GitHub release, so consumers can pin a version
# (and Renovate can bump it) instead of tracking @main. Second-precision CalVer
# means multiple releases a day never collide. Dogfoods this repo's own actions.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create the tag and the release

# Serialize runs: needs-release reads the previous tag before this run creates its
# own, so two quick pushes would otherwise read the same bound and emit
# overlapping notes. Queue (never cancel) so the earlier run tags first.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # needs-release/calver read tags and history
      - id: gate
        uses: ./needs-release
        with:
          paths: .github/workflows calver needs-release detect-repo-type container-release cosign-sign-blob release-notes nix-devshell policy policy-check
      - id: version
        if: steps.gate.outputs.needed == 'true'
        uses: ./calver
      - id: notes
        name: Generate release notes
        if: steps.gate.outputs.needed == 'true'
        uses: ./release-notes
        with:
          version: ${{ steps.version.outputs.version }}
          previous: ${{ steps.gate.outputs.last }}
      - name: Create release
        if: steps.gate.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.notes.outputs.file }}
        run: gh release create "$VERSION" --target "$GITHUB_SHA" --notes-file "$NOTES" --title "$VERSION"
