name: Cosign sign-blob
description: >
  Install cosign and keyless-sign a file (Fulcio OIDC), writing a Sigstore bundle
  next to it as <file>.bundle. The calling job needs `permissions: { id-token:
  write }`.

inputs:
  file:
    description: Path to the file to sign (e.g. the SHA256SUMS).
    required: true

outputs:
  bundle:
    description: Path to the written signature bundle.
    value: ${{ inputs.file }}.bundle

runs:
  using: composite
  steps:
    - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
    - shell: bash
      env:
        FILE: ${{ inputs.file }}
      # Recent cosign defaults to the Sigstore bundle format: --output-signature /
      # --output-certificate are ignored and a single --bundle (signature +
      # certificate + Rekor proof) is written instead. Omitting --bundle makes
      # cosign open an empty path and fail.
      run: |
        set -euo pipefail
        # Fulcio/Rekor occasionally return transient 5xx; a single failure here
        # aborts the release after the image is already published, forcing a
        # manual re-run (against the zero-manual policy). Retry with exponential
        # backoff. Re-signing is safe — each attempt writes a fresh bundle.
        attempts=5
        delay=10
        for i in $(seq 1 "$attempts"); do
          if cosign sign-blob --yes --bundle "${FILE}.bundle" "${FILE}"; then
            exit 0
          fi
          if [ "$i" -lt "$attempts" ]; then
            echo "::warning::cosign sign-blob attempt ${i}/${attempts} failed (often a transient Fulcio/Rekor 5xx); retrying in ${delay}s"
            sleep "$delay"
            delay=$((delay * 2))
          fi
        done
        echo "::error::cosign sign-blob failed after ${attempts} attempts"
        exit 1
