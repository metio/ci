# Backwards-compatible shim. The composite now lives in its own repo
# (metio/nix-devshell) so its version is decoupled from this repo's release
# cadence — a reusable workflow that self-referenced this repo's own tags cut a
# release on every merge, which then chased its own new tag. Repos pinning
# metio/ci/nix-devshell keep working unchanged; this forwards to the real
# action. New callers should reference metio/nix-devshell directly.
name: Nix devShell
description: Install Nix with the /nix store cached, keyed on the repo's flake pin
runs:
  using: composite
  steps:
    - uses: metio/nix-devshell@1976169d4c51b321be318ade369ccf689849f9f0 # 2026.7.6091757
