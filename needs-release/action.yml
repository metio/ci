name: Needs release
description: >
  Decide whether a release is warranted: true when there is no prior release, or
  when commits since the last release touched any of the given paths. Lets a
  scheduled release workflow no-op on a quiet period instead of cutting an empty
  release. In a monorepo releasing several units with prefixed tags, scope the
  boundary to one unit's tags via tag-match — otherwise another unit's newer tag
  would hide this unit's pending changes. Requires a full-history checkout with
  tags (actions/checkout with fetch-depth: 0).

inputs:
  paths:
    description: Space-separated paths that, when changed since the last release, warrant a release (e.g. "go.mod main.go internal api").
    required: true
  tag-match:
    description: Optional glob selecting which tags count as this unit's releases (git describe --match), e.g. "myapp-*" in a monorepo with per-unit tag prefixes. Empty considers every tag.
    required: false
    default: ""

outputs:
  needed:
    description: '"true" when a release is warranted, "false" otherwise.'
    value: ${{ steps.check.outputs.needed }}
  last:
    description: The last release tag, or empty when there is none.
    value: ${{ steps.check.outputs.last }}

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        TAG_MATCH: ${{ inputs.tag-match }}
      run: |
        set -uo pipefail
        # Last release = most recent tag reachable from HEAD, scoped to this
        # unit's tags when tag-match is given. No tag → first release.
        describe_args=(--tags --abbrev=0)
        [ -n "$TAG_MATCH" ] && describe_args+=(--match "$TAG_MATCH")
        last="$(git describe "${describe_args[@]}" 2>/dev/null || true)"
        echo "last=$last" >> "$GITHUB_OUTPUT"
        if [ -z "$last" ]; then
          echo "needed=true" >> "$GITHUB_OUTPUT"
          echo "no prior release tag; release needed"
          exit 0
        fi
        # word-split PATHS into pathspecs deliberately.
        # shellcheck disable=SC2086
        changed="$(git diff --name-only "$last"..HEAD -- $PATHS | head -1)"
        if [ -n "$changed" ]; then
          echo "needed=true" >> "$GITHUB_OUTPUT"
          echo "changes under the given paths since $last; release needed"
        else
          echo "needed=false" >> "$GITHUB_OUTPUT"
          echo "no changes under the given paths since $last; skipping release"
        fi
